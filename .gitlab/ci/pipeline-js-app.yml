# ================================
# PIPELINE TEMPLATE — Laravel App JS/Frontend
# ================================
# Provides JS/Frontend CI jobs for a Laravel application.
# Includes pipeline-js-package.yml (all js: jobs) and disables the
# package-specific stages (build, publish, release) not relevant for apps.
#
# PHP jobs come from laravel-dev-tools (pipeline-laravel-app.yml).
# All js: job names never conflict with php: job names.
#
# Fullstack usage (recommended — single include):
# ─────────────────────────────────────────────────────
#   include:
#     - project: 'zairakai/php-packages/laravel-dev-tools'
#       ref: main
#       file: '.gitlab/ci/pipeline-laravel-fullstack.yml'
#
# Standalone usage (JS side only, alongside a custom PHP pipeline):
# ─────────────────────────────────────────────────────
#   include:
#     - project: 'zairakai/npm-packages/dev-tools'
#       ref: main
#       file: '.gitlab/ci/pipeline-js-app.yml'
#
#   variables:
#     CACHE_KEY: "my-app-v1"
# ================================

include:
  # All js: jobs come from pipeline-js-package.yml — no duplication.
  - project: "zairakai/npm-packages/dev-tools"
    ref: main
    file: ".gitlab/ci/pipeline-js-package.yml"

# ================================
# STAGES
# ================================
# Merges with PHP pipeline stages — GitLab deduplicates identical names.
# The build/publish/release stages from pipeline-js-package.yml are kept
# in the merged list but stay empty (jobs below are disabled).
stages:
  - security
  - install
  - validate
  - quality
  - test
  - deploy
  - metrics

# ================================
# VARIABLES
# ================================
variables:
  # Default cache key for app context (overridden per project via CACHE_KEY).
  CACHE_KEY: "zairakai-laravel-app"

  # Note: GIT_CLEAN_FLAGS intentionally NOT set here.
  # pipeline-laravel-fullstack.yml sets the combined value to preserve
  # both vendor/ and node_modules/.

# ================================
# DISABLE package-specific jobs
# Not relevant for a Laravel app (no npm publish or GitLab release).
# ================================
js:build:
  rules:
    - when: never

js:publish:
  rules:
    - when: never

js:release:
  rules:
    - when: never
